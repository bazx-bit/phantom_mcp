name: Site-Ghost Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install mcp playwright Pillow nest-asyncio
          playwright install chromium

      - name: Run engine tests
        env:
          PYTHONIOENCODING: utf-8
        run: python test/engine_test.py

      - name: Run skill quality check
        run: python scripts/skill_check.py
